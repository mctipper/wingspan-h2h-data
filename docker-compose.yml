services:
  public:
    build: .
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./src/assets:/app/src/assets
    restart: unless-stopped

  admin:
    build: .
    command: npm run dev:admin
    ports:
      - "5174:5174"
    volumes:
      - ./src/assets:/app/src/assets
    restart: unless-stopped
